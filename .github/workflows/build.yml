name: Build GL4ES Amethyst Patch

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    name: Build libgl4es_116.dylib
    runs-on: macos-latest

    steps:
      - name: Install dependencies
        run: brew install cmake wget

      - name: Checkout this fork
        uses: actions/checkout@v4

      - name: Download iOS CMake toolchain
        run: |
          wget https://github.com/leetal/ios-cmake/raw/master/ios.toolchain.cmake

      - name: Patch iOS compatibility and exports
        run: |
          # Remove hidden visibility from ios-cmake toolchain
          sed -i '' 's/-fvisibility=hidden//g' ios.toolchain.cmake
          sed -i '' 's/-fvisibility-inlines-hidden//g' ios.toolchain.cmake
          sed -i '' 's/set(ENABLE_VISIBILITY TRUE/set(ENABLE_VISIBILITY FALSE/g' ios.toolchain.cmake || true
          sed -i '' 's/ENABLE_VISIBILITY TRUE/ENABLE_VISIBILITY FALSE/g' ios.toolchain.cmake || true

          # Patch GL4ES attributes so Apple/iOS exports symbols publicly.
          python3 << 'PY'
          from pathlib import Path

          p = Path("src/gl/attributes.h")
          s = p.read_text()

          s = s.replace(
              "#if defined(__EMSCRIPTEN__) || defined(__APPLE__)\n#define EXPORT",
              "#if defined(__EMSCRIPTEN__)\n#define EXPORT\n#elif defined(__APPLE__)\n#define EXPORT __attribute__((visibility(\"default\")))"
          )

          s = s.replace(
              "#define AliasExport(RET,NAME,X,DEF) RET NAME##X DEF",
              "#define AliasExport(RET,NAME,X,DEF) EXPORT RET APIENTRY_GL4ES NAME##X DEF"
          )

          s = s.replace(
              "#define NonAliasExportDecl(RET,NAME,DEF) RET NAME DEF",
              "#define NonAliasExportDecl(RET,NAME,DEF) EXPORT RET APIENTRY_GL4ES NAME DEF"
          )

          p.write_text(s)
          print("Patched attributes.h")
          PY

          # Darwin/iOS does not support GCC alias attribute in these lines.
          python3 << 'PY'
          from pathlib import Path

          p = Path("src/gl/directstate.c")
          if p.exists():
              s = p.read_text()

              s = s.replace(
                  "AliasDecl(void,gl4es_glEnableClientStatei,(GLenum array, GLuint index),gl4es_glEnableClientStateIndexed);",
                  """void APIENTRY_GL4ES gl4es_glEnableClientStatei(GLenum array, GLuint index) {
              gl4es_glEnableClientStateIndexed(array, index);
          }"""
              )

              s = s.replace(
                  "AliasDecl(void,gl4es_glDisableClientStatei,(GLenum array, GLuint index),gl4es_glDisableClientStateIndexed);",
                  """void APIENTRY_GL4ES gl4es_glDisableClientStatei(GLenum array, GLuint index) {
              gl4es_glDisableClientStateIndexed(array, index);
          }"""
              )

              p.write_text(s)
              print("Patched directstate.c")
          PY

          # Export gl4es_GetProcAddress directly if possible.
          python3 << 'PY'
          from pathlib import Path
          import re

          patched = False

          for path in Path("src").rglob("*.c"):
              s = path.read_text(errors="ignore")
              if "gl4es_GetProcAddress" not in s:
                  continue

              original = s

              s = re.sub(
                  r'(?m)^\s*static\s+(void\s*\*\s*(?:APIENTRY_GL4ES\s*)?gl4es_GetProcAddress\s*\()',
                  r'EXPORT \1',
                  s
              )

              s = re.sub(
                  r'(?m)^(\s*)(void\s*\*\s*gl4es_GetProcAddress\s*\()',
                  r'\1EXPORT \2',
                  s
              )

              s = re.sub(
                  r'(?m)^(\s*)(void\s*\*\s*APIENTRY_GL4ES\s+gl4es_GetProcAddress\s*\()',
                  r'\1EXPORT \2',
                  s
              )

              s = re.sub(
                  r'(?m)^(\s*)(void\*\s*APIENTRY_GL4ES\s+gl4es_GetProcAddress\s*\()',
                  r'\1EXPORT \2',
                  s
              )

              if s != original:
                  print("Patched gl4es_GetProcAddress export in", path)
                  patched = True
                  path.write_text(s)

          if not patched:
              print("WARNING: gl4es_GetProcAddress definition was not patched directly.")
          PY

          # Force GL4ES loader to use OpenGLES.framework on iOS.
          python3 << 'PY'
          from pathlib import Path

          p = Path("src/gl/loader.c")
          s = p.read_text()

          framework_path = "/System/Library/Frameworks/OpenGLES.framework/OpenGLES"

          # Force DEFAULT_GLES inside loader.c itself.
          s = s.replace(
              "#ifndef DEFAULT_GLES\n#define DEFAULT_GLES NULL\n#endif",
              "#undef DEFAULT_GLES\n#define DEFAULT_GLES \"" + framework_path + "\""
          )

          # Keep the path visible in the final dylib so inspect can verify it.
          if "gl4es_ios_opengles_framework_path" not in s:
              first_newline = s.find("\n")
              inject = (
                  "\n__attribute__((used)) "
                  "static const char *gl4es_ios_opengles_framework_path = "
                  "\"" + framework_path + "\";\n"
              )
              s = s[:first_newline + 1] + inject + s[first_newline + 1:]

          # On Apple, try symbols from the loaded GLES framework first.
          old = "#elif defined __APPLE__ // apple code seems to use RTLD_NEXT which is usually ((void*)-1) // remove if it not needed return dlsym((void*)(~(uintptr_t)0), name);"
          new = "#elif defined __APPLE__\n    if(lib) { void *p = dlsym(lib, name); if(p) return p; }\n    return dlsym((void*)(~(uintptr_t)0), name);"
          s = s.replace(old, new)

          p.write_text(s)
          print("Patched loader.c: forced DEFAULT_GLES to OpenGLES.framework and fixed Apple dlsym path")
          PY

          # Provide exported OpenGL / GLX / EGL proc-address symbols for LWJGL/iOS.
          cat > src/gl/ios_exports.c << 'EOF'
          #include <stdio.h>
          #include <dlfcn.h>

          typedef unsigned int GLenum;
          typedef int GLint;
          typedef unsigned int GLuint;
          typedef float GLfloat;
          typedef unsigned int GLbitfield;
          typedef int GLsizei;
          typedef unsigned char GLubyte;

          __attribute__((visibility("default")))
          void *gl4es_GetProcAddress(const char *name);

          const unsigned char *gl4es_glGetString(GLenum name);
          void gl4es_glClear(GLbitfield mask);
          void gl4es_glViewport(GLint x, GLint y, GLsizei width, GLsizei height);
          void gl4es_glClearColor(GLfloat red, GLfloat green, GLfloat blue, GLfloat alpha);
          void gl4es_glEnable(GLenum cap);
          void gl4es_glDisable(GLenum cap);
          void gl4es_glGetFloatv(GLenum pname, GLfloat *params);
          void gl4es_glGetIntegerv(GLenum pname, GLint *params);
          GLenum gl4es_glGetError(void);
          void gl4es_glStencilFunc(GLenum func, GLint ref, GLuint mask);
          void gl4es_glStencilOp(GLenum fail, GLenum zfail, GLenum zpass);

          static void *gl4es116_gles_lib(void) {
              static void *lib = 0;

              if (!lib) {
                  lib = dlopen(
                      "/System/Library/Frameworks/OpenGLES.framework/OpenGLES",
                      RTLD_LAZY | RTLD_GLOBAL
                  );
              }

              return lib;
          }

          static void *gl4es116_gles_sym(const char *name) {
              void *lib = gl4es116_gles_lib();

              if (!lib) {
                  fprintf(stderr, "[gl4es116] failed to dlopen OpenGLES.framework\n");
                  return 0;
              }

              void *p = dlsym(lib, name);

              if (!p) {
                  fprintf(stderr, "[gl4es116] dlsym(%s) = NULL\n", name ? name : "(null)");
              }

              return p;
          }

          __attribute__((visibility("default")))
          void *gl4es_GetProcAddress_export(const char *name) {
              void *p = gl4es_GetProcAddress(name);
              fprintf(stderr, "[gl4es116] gl4es_GetProcAddress_export(%s) = %p\n", name ? name : "(null)", p);
              return p;
          }

          __attribute__((visibility("default")))
          void *glGetProcAddress(const char *name) {
              void *p = gl4es_GetProcAddress(name);
              fprintf(stderr, "[gl4es116] glGetProcAddress(%s) = %p\n", name ? name : "(null)", p);
              return p;
          }

          __attribute__((visibility("default")))
          void *glXGetProcAddress(const unsigned char *name) {
              void *p = gl4es_GetProcAddress((const char *)name);
              fprintf(stderr, "[gl4es116] glXGetProcAddress(%s) = %p\n", name ? (const char *)name : "(null)", p);
              return p;
          }

          __attribute__((visibility("default")))
          void *glXGetProcAddressARB(const unsigned char *name) {
              void *p = gl4es_GetProcAddress((const char *)name);
              fprintf(stderr, "[gl4es116] glXGetProcAddressARB(%s) = %p\n", name ? (const char *)name : "(null)", p);
              return p;
          }

          __attribute__((visibility("default")))
          void *eglGetProcAddress(const char *name) {
              void *p = gl4es_GetProcAddress(name);
              fprintf(stderr, "[gl4es116] eglGetProcAddress(%s) = %p\n", name ? name : "(null)", p);
              return p;
          }

          __attribute__((visibility("default")))
          const GLubyte *glGetString(GLenum name) {
              static const GLubyte *(*real_glGetString)(GLenum) = 0;

              if (!real_glGetString) {
                  real_glGetString = (const GLubyte *(*)(GLenum))gl4es116_gles_sym("glGetString");
              }

              if (real_glGetString) {
                  const GLubyte *ret = real_glGetString(name);
                  if (ret) {
                      return ret;
                  }
              }

              return gl4es_glGetString(name);
          }

          __attribute__((visibility("default")))
          void glClear(GLbitfield mask) {
              static void (*real_glClear)(GLbitfield) = 0;

              if (!real_glClear) {
                  real_glClear = (void (*)(GLbitfield))gl4es116_gles_sym("glClear");
              }

              if (real_glClear) {
                  real_glClear(mask);
                  return;
              }

              gl4es_glClear(mask);
          }

          __attribute__((visibility("default")))
          void glViewport(GLint x, GLint y, GLsizei width, GLsizei height) {
              static void (*real_glViewport)(GLint, GLint, GLsizei, GLsizei) = 0;

              if (!real_glViewport) {
                  real_glViewport = (void (*)(GLint, GLint, GLsizei, GLsizei))gl4es116_gles_sym("glViewport");
              }

              if (real_glViewport) {
                  real_glViewport(x, y, width, height);
                  return;
              }

              gl4es_glViewport(x, y, width, height);
          }

          __attribute__((visibility("default")))
          void glClearColor(GLfloat red, GLfloat green, GLfloat blue, GLfloat alpha) {
              static void (*real_glClearColor)(GLfloat, GLfloat, GLfloat, GLfloat) = 0;

              if (!real_glClearColor) {
                  real_glClearColor = (void (*)(GLfloat, GLfloat, GLfloat, GLfloat))gl4es116_gles_sym("glClearColor");
              }

              if (real_glClearColor) {
                  real_glClearColor(red, green, blue, alpha);
                  return;
              }

              gl4es_glClearColor(red, green, blue, alpha);
          }

          __attribute__((visibility("default")))
          void glEnable(GLenum cap) {
              static void (*real_glEnable)(GLenum) = 0;

              if (!real_glEnable) {
                  real_glEnable = (void (*)(GLenum))gl4es116_gles_sym("glEnable");
              }

              if (real_glEnable) {
                  real_glEnable(cap);
                  return;
              }

              gl4es_glEnable(cap);
          }

          __attribute__((visibility("default")))
          void glDisable(GLenum cap) {
              static void (*real_glDisable)(GLenum) = 0;

              if (!real_glDisable) {
                  real_glDisable = (void (*)(GLenum))gl4es116_gles_sym("glDisable");
              }

              if (real_glDisable) {
                  real_glDisable(cap);
                  return;
              }

              gl4es_glDisable(cap);
          }

          __attribute__((visibility("default")))
          void glGetFloatv(GLenum pname, GLfloat *params) {
              static void (*real_glGetFloatv)(GLenum, GLfloat *) = 0;

              if (!real_glGetFloatv) {
                  real_glGetFloatv = (void (*)(GLenum, GLfloat *))gl4es116_gles_sym("glGetFloatv");
              }

              if (real_glGetFloatv) {
                  real_glGetFloatv(pname, params);
                  return;
              }

              if (params) {
                  params[0] = 0.0f;
              }
          }

          __attribute__((visibility("default")))
          void glGetIntegerv(GLenum pname, GLint *params) {
              static void (*real_glGetIntegerv)(GLenum, GLint *) = 0;

              if (!real_glGetIntegerv) {
                  real_glGetIntegerv = (void (*)(GLenum, GLint *))gl4es116_gles_sym("glGetIntegerv");
              }

              if (real_glGetIntegerv) {
                  real_glGetIntegerv(pname, params);
                  return;
              }

              if (params) {
                  params[0] = 0;
              }
          }

          __attribute__((visibility("default")))
          GLenum glGetError(void) {
              static GLenum (*real_glGetError)(void) = 0;

              if (!real_glGetError) {
                  real_glGetError = (GLenum (*)(void))gl4es116_gles_sym("glGetError");
              }

              if (real_glGetError) {
                  return real_glGetError();
              }

              return 0;
          }

          __attribute__((visibility("default")))
          void glStencilFunc(GLenum func, GLint ref, GLuint mask) {
              static void (*real_glStencilFunc)(GLenum, GLint, GLuint) = 0;

              if (!real_glStencilFunc) {
                  real_glStencilFunc = (void (*)(GLenum, GLint, GLuint))gl4es116_gles_sym("glStencilFunc");
              }

              if (real_glStencilFunc) {
                  real_glStencilFunc(func, ref, mask);
                  return;
              }

              gl4es_glStencilFunc(func, ref, mask);
          }

          __attribute__((visibility("default")))
          void glStencilOp(GLenum fail, GLenum zfail, GLenum zpass) {
              static void (*real_glStencilOp)(GLenum, GLenum, GLenum) = 0;

              if (!real_glStencilOp) {
                  real_glStencilOp = (void (*)(GLenum, GLenum, GLenum))gl4es116_gles_sym("glStencilOp");
              }

              if (real_glStencilOp) {
                  real_glStencilOp(fail, zfail, zpass);
                  return;
              }

              gl4es_glStencilOp(fail, zfail, zpass);
          }
          EOF

          # Inject ios_exports.c and GLX shim before GL target is created.
          python3 << 'PY'
          from pathlib import Path

          p = Path("src/CMakeLists.txt")
          s = p.read_text()

          marker = "add_library(GL SHARED ${GL_SRC})"

          inject = '''
          # iOS / Amethyst compatibility exports
          list(APPEND GL_SRC
              ${CMAKE_CURRENT_SOURCE_DIR}/gl/ios_exports.c
          )

          # iOS / Amethyst GLX shim
          include_directories(glx)
          list(APPEND GL_SRC
              ${CMAKE_CURRENT_SOURCE_DIR}/glx/hardext.c
              ${CMAKE_CURRENT_SOURCE_DIR}/glx/gbm.c
              ${CMAKE_CURRENT_SOURCE_DIR}/glx/glx.c
              ${CMAKE_CURRENT_SOURCE_DIR}/glx/lookup.c
              ${CMAKE_CURRENT_SOURCE_DIR}/glx/streaming.c
          )
          list(APPEND GL_H
              ${CMAKE_CURRENT_SOURCE_DIR}/glx/glx.h
              ${CMAKE_CURRENT_SOURCE_DIR}/glx/hardext.h
              ${CMAKE_CURRENT_SOURCE_DIR}/glx/streaming.h
          )
          '''

          if "gl/ios_exports.c" in s and "iOS / Amethyst GLX shim" in s:
              print("iOS exports and GLX shim already injected")
          elif marker in s:
              s = s.replace(marker, inject + "\n" + marker, 1)
              p.write_text(s)
              print("Injected ios_exports.c and GLX shim before GL target")
          else:
              print("Could not find add_library marker")
              print(s[-2000:])
              raise SystemExit(1)
          PY

          # iOS does not allow system(), remove xrefresh call from GLX shim.
          python3 << 'PY'
          from pathlib import Path

          p = Path("src/glx/glx.c")
          s = p.read_text()

          s = s.replace(
              '    int dummy = system("xrefresh");',
              '    int dummy = 0;'
          )

          p.write_text(s)
          print("Patched glx.c: removed system(\"xrefresh\") for iOS")
          PY

      - name: Build GL4ES for iOS arm64
        run: |
          cmake -B build \
            -DCMAKE_TOOLCHAIN_FILE=ios.toolchain.cmake \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
            -DPLATFORM=OS64 \
            -DDEFAULT_ES=2 \
            -DDEFAULT_GLES=/System/Library/Frameworks/OpenGLES.framework/OpenGLES \
            -DNOX11=ON \
            -DNOEGL=ON \
            -DSTATICLIB=OFF \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCMAKE_C_VISIBILITY_PRESET=default \
            -DCMAKE_VISIBILITY_INLINES_HIDDEN=OFF \
            -DENABLE_VISIBILITY=OFF \
            -DCMAKE_XCODE_ATTRIBUTE_GCC_SYMBOLS_PRIVATE_EXTERN=NO \
            -DCMAKE_XCODE_ATTRIBUTE_CODE_SIGNING_ALLOWED=NO \
            -DCMAKE_XCODE_ATTRIBUTE_CODE_SIGNING_REQUIRED=NO \
            -DCMAKE_C_FLAGS="-fvisibility=default -Wno-error=implicit-function-declaration -Wno-error=unused-function" \
            -DCMAKE_SHARED_LINKER_FLAGS="-framework OpenGLES -framework Foundation -framework QuartzCore -framework UIKit"

          cmake --build build --config RelWithDebInfo --target GL

          cp lib/libGL.dylib ./libgl4es_116.dylib
          install_name_tool -id @rpath/libgl4es_116.dylib ./libgl4es_116.dylib

      - name: Inspect dylib
        run: |
          echo "=== File info ==="
          ls -lh libgl4es_116.dylib
          file libgl4es_116.dylib

          echo "=== Install name ==="
          otool -D libgl4es_116.dylib | tee install_name.txt

          echo "=== Linked libraries ==="
          otool -L libgl4es_116.dylib | tee linked_libraries.txt

          echo "=== Key symbols ==="
          nm -a libgl4es_116.dylib | grep -E "_gl4es_GetProcAddress|_glGetProcAddress|_glXGetProcAddress|_glXGetProcAddressARB|_eglGetProcAddress|_glXCreateContext|_glXMakeCurrent|_glXSwapBuffers|_glGetString|_glClear|_glViewport|_glStencilFunc|_glStencilOp|_glGetFloatv|_glGetError" | tee key_symbols.txt || true

          echo "=== Dynamic external symbols ==="
          nm -gU libgl4es_116.dylib | grep -E "_gl4es_GetProcAddress|_glGetProcAddress|_glXGetProcAddress|_glXGetProcAddressARB|_eglGetProcAddress|_glXCreateContext|_glXMakeCurrent|_glXSwapBuffers|_glGetString|_glClear|_glViewport|_glStencilFunc|_glStencilOp|_glGetFloatv|_glGetError" | tee exported_symbols.txt || true

          echo "=== Required symbol check ==="
          REQUIRED="_glGetProcAddress _glXGetProcAddress _glXGetProcAddressARB _eglGetProcAddress _glGetString _glViewport _glGetError"
          for sym in $REQUIRED; do
            if ! nm -gU libgl4es_116.dylib | grep -q "$sym"; then
              echo "Missing required symbol: $sym"
              exit 1
            fi
          done

          echo "=== Undefined symbols ==="
          nm -u libgl4es_116.dylib | tee undefined_symbols.txt || true

          echo "=== Strings ==="
          strings libgl4es_116.dylib | grep -Ei "OpenGLES.framework|GL4ES|LIBGL|gl4es116|GetProcAddress|eglGetProcAddress|glXGetProcAddress|glGetString|glClear|glViewport|glGetError" | head -500 | tee strings_check.txt || true

          echo "=== OpenGLES framework string check ==="
          strings libgl4es_116.dylib | grep -F "OpenGLES.framework" | tee opengles_string.txt || true

      - name: Upload libgl4es_116
        uses: actions/upload-artifact@v4
        with:
          name: libgl4es_116
          path: libgl4es_116.dylib

      - name: Upload inspect
        uses: actions/upload-artifact@v4
        with:
          name: gl4es_116_inspect
          path: |
            install_name.txt
            linked_libraries.txt
            key_symbols.txt
            exported_symbols.txt
            undefined_symbols.txt
            strings_check.txt
            opengles_string.txt